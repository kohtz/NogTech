x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    _PIP_ADDITIONAL_REQUIREMENTS: "requests==2.31.0 psycopg2-binary==2.9.9"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    PYTHONPATH: /opt/airflow/scripts
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - nogtech-network

services:

  # Banco interno metadados 
  postgres-airflow:
    image: postgres:15
    container_name: postgres-metadados
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - nogtech-network


  # Banco da NogTech destino
  postgres-nogtech:
    image: postgres:15
    container_name: postgres-nogtech
    environment:
      POSTGRES_USER: nogtech
      POSTGRES_PASSWORD: nogtech123
      POSTGRES_DB: nogtech_dw
    ports:
      - "5433:5432"
    volumes:
      - postgres-nogtech-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nogtech"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - nogtech-network

  # Inicialização do banco de metadados, criação de users e banco
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@nogtech.com
    restart: "no"

  # Webserver (UI do Airflow)
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-server
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy

  # Scheduler executa as DAGs
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-airflow:
        condition: service_healthy

networks:
  nogtech-network:
    driver: bridge

volumes:
  postgres-airflow-data:
  postgres-nogtech-data:
